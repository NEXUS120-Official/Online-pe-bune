<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online pe Bune – Postează fără frică</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: linear-gradient(160deg, #FAF0E6 0%, #FFF8F0 100%);
            color: #2E2E2E;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
            text-align: center;
        }
        .container {
            max-width: 720px;
            width: 100%;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 2rem;
            padding: 2.5rem 2rem;
            box-shadow: 0 20px 40px rgba(0,0,0,0.05);
        }
        h1 {
            font-size: 2.8rem;
            font-weight: 700;
            color: #C85A17; /* teracotă cald */
            margin-bottom: 0.4rem;
            letter-spacing: -0.5px;
        }
        .subtitle {
            font-size: 1.2rem;
            color: #5D5D5D;
            margin-bottom: 1.5rem;
        }
        .video-wrapper {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%; /* 16:9 */
            margin-bottom: 1.8rem;
            border-radius: 1.2rem;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
        }
        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }
        .description {
            font-size: 1.05rem;
            line-height: 1.6;
            color: #3A3A3A;
            margin-bottom: 2rem;
            padding: 0 0.5rem;
        }
        .btn {
            display: inline-block;
            background: #C85A17;
            color: white;
            font-size: 1.25rem;
            font-weight: 600;
            padding: 1rem 2.5rem;
            border-radius: 3rem;
            text-decoration: none;
            transition: all 0.25s ease;
            box-shadow: 0 6px 15px rgba(200, 90, 23, 0.3);
            border: none;
            cursor: pointer;
        }
        .btn:hover {
            background: #A6470F;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(200, 90, 23, 0.35);
        }
        .footer-note {
            margin-top: 2rem;
            font-size: 0.9rem;
            color: #8A8A8A;
        }
        /* responsive pentru mobil */
        @media (max-width: 500px) {
            h1 {
                font-size: 2.2rem;
            }
            .container {
                padding: 2rem 1.2rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Online pe Bune</h1>
        <p class="subtitle">Postează fără frică. Program gratuit de 90 de zile.</p>

        <!-- Înlocuiește VIDEO_ID cu ID-ul tău de pe YouTube -->
        <div class="video-wrapper">
            <iframe src="https://www.youtube.com/embed/cHkEvg7jRm8" 
                    title="Online pe Bune - video de prezentare"
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                    allowfullscreen>
            </iframe>
        </div>

        <p class="description">
            Te ajut să postezi primul tău video, chiar dacă acum ți-e teamă. 
            Eu mă ocup de editare, tu doar filmezi pe telefon. Maxim 5 locuri pe lună. Gratuit.
        </p>

        <a href="https://forms.gle/N1kifsjg3qpaSTJPA" class="btn" target="_blank">
            Vreau să intru în program
        </a>

        <p class="footer-note">
            Singura condiție: o recenzie onestă la final.
        </p>
    </div>
</body>
</html>
